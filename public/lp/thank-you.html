  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Noto Sans JP", sans-serif; color: #222; line-height: 1.8; background: #fff; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

    /* HEADER — same as LP policy pages */
    .site-header { background: #1a1f28; padding: 16px 0; }
    .site-header .container { display: flex; justify-content: space-between; align-items: center; }
    .site-header .logo { font-family: "Montserrat", sans-serif; font-size: 22px; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: 2px; }
    .site-header .back-link { font-size: 13px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.2s; }
    .site-header .back-link:hover { color: #fff; }

    /* CONTENT */
    .thank-you-content { padding: 80px 0 100px; flex: 1; text-align: center; }
    .thank-you-icon { width: 80px; height: 80px; background: #263290; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .thank-you-icon svg { width: 40px; height: 40px; fill: #fff; }
    .thank-you-content h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #222; }
    .thank-you-content p { font-size: 15px; margin-bottom: 12px; color: #333; }
    .thank-you-content .note { font-size: 13px; color: #999; margin-top: 8px; }
    .btn { padding: 30px 0 0; font-size: 20px; text-align: center; }
    .btn a { transition: 0.2s linear; position: relative; display: block; width: 90%; max-width: 590px; height: 80px; margin: auto; background: #fe4343; line-height: 80px; color: #fff; text-decoration: none; }
    .btn a:after { content: ''; width: 15px; height: 15px; position: absolute; top: 50%; right: 5%; margin-top: -8px; border-top: solid 1px #fff; border-right: solid 1px #fff; transform: rotate(45deg); }
    .btn a:hover { opacity: 0.5; }
    .btn a span { display: inline-block; position: relative; }

    /* FOOTER — same as LP policy pages */
    .sec-footer { padding: 40px 0 20px; background: #1a1f28; color: #fff; }
    .footer-inner { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
    .footer-inner a { font-size: 12px; color: rgba(255,255,255,0.5); text-decoration: none; transition: 0.2s; }
    .footer-inner a:hover { color: #fff; }
    .footer-copy { text-align: center; font-size: 12px; color: rgba(255,255,255,0.3); font-family: "Montserrat", sans-serif; }

    @media (max-width: 640px) {
      .thank-you-content { padding: 60px 0 80px; }
      .thank-you-content h1 { font-size: 20px; }
      .footer-inner { flex-wrap: wrap; justify-content: center; }
      .btn { font-size: 18px; }
      .btn a { height: 60px; line-height: 60px; }
    }
  </style>

<body>

  <header class="site-header">
    <div class="container">
      <a href="/lp" class="logo">sona</a>

  <main class="thank-you-content">

      <div class="thank-you-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </div>
      <h1>お問い合わせありがとうございます</h1>
      <p>内容を確認のうえ、担当者より<br>1営業日以内にご連絡いたします。</p>
      <p class="note">※ nakaza@sona-jp.com からご連絡いたします。<br>迷惑メールフォルダもご確認ください。</p>
      <div class="btn">
        <a href="/lp"><span>サービスサイトに戻る</span></a>
      </div>
    </div>
  </main>

  <footer class="sec-footer">
    <div class="container">
      <div class="footer-inner">
        <a href="/lp/privacy.html">プライバシーポリシー</a>
        <a href="/lp/terms.html">利用規約</a>
        <a href="/lp/legal.html">特定商取引法に基づく表記</a>
      </div>
      <p class="footer-copy">&copy; 2026 sona All Rights Reserved.</p>
    </div>
  </footer>

</body>
</html>
